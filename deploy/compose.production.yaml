name: maxposty-backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  runtime-storage-init:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: "no"
    user: "0:0"
    entrypoint: ["/bin/sh", "-ec"]
    # Compose otherwise tokenizes a scalar command before passing it to the
    # overridden `sh -ec` entrypoint. Keep the complete script in one argv
    # element so `mkdir` does not become the script with the remaining tokens
    # incorrectly assigned to shell positional parameters.
    command:
      - >-
        mkdir -p /var/lib/postgresql/wal-archive /var/lib/postgresql/base-backups /alertmanager-config &&
        chown -R postgres:postgres /var/lib/postgresql/wal-archive /var/lib/postgresql/base-backups &&
        chmod 0700 /var/lib/postgresql/wal-archive /var/lib/postgresql/base-backups &&
        cp /source/alertmanager.yml /alertmanager-config/alertmanager.yml &&
        chown 65534:65534 /alertmanager-config/alertmanager.yml &&
        chmod 0400 /alertmanager-config/alertmanager.yml
    volumes:
      - postgres-wal-archive:/var/lib/postgresql/wal-archive
      - postgres-base-backups:/var/lib/postgresql/base-backups
      - alertmanager-config:/alertmanager-config
      - ../.alertmanager.yml:/source/alertmanager.yml:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    network_mode: none

  postgres:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_OWNER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - max_connections=100
      - -c
      - idle_in_transaction_session_timeout=60s
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=1000
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.track_utility=off
      - -c
      - compute_query_id=on
      - -c
      - track_io_timing=on
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=300s
      - -c
      - archive_command=test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - postgres-wal-archive:/var/lib/postgresql/wal-archive
      - postgres-base-backups:/var/lib/postgresql/base-backups
      - ../docker/postgres/init-app-role.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    shm_size: 128mb
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      runtime-storage-init:
        condition: service_completed_successfully
    networks:
      - database

  pgbouncer:
    image: percona/percona-pgbouncer:1.25.2@sha256:0da7c2501ebe8523f58f1e892bce0722b242300a769894c92b948d1bd48ca406
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/maxposty-pgbouncer-entrypoint"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_MONITOR_USER: ${POSTGRES_MONITOR_USER}
      POSTGRES_MONITOR_PASSWORD: ${POSTGRES_MONITOR_PASSWORD}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE}
      PGBOUNCER_MIN_POOL_SIZE: ${PGBOUNCER_MIN_POOL_SIZE}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN}
    expose:
      - "6432"
    volumes:
      - ../docker/pgbouncer/entrypoint.sh:/usr/local/bin/maxposty-pgbouncer-entrypoint:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      monitoring-role:
        condition: service_completed_successfully
    healthcheck:
      # The pinned Percona image has Bash but does not ship PostgreSQL client
      # tools. Opening PgBouncer's listening socket avoids a false unhealthy
      # state without adding packages to the read-only runtime container.
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/6432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    logging: *default-logging
    networks:
      - pool
      - database

  migrate:
    image: ${BACKEND_IMAGE}
    restart: "no"
    entrypoint: ["/app/migrate"]
    environment:
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_OWNER_USER}:${POSTGRES_OWNER_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - database

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?sslmode=disable
      MEDIA_DIR: /app/media
      S3_HOST: ${S3_HOST}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      MEDIA_USER_MAX_FILES: ${MEDIA_USER_MAX_FILES}
      MEDIA_USER_MAX_BYTES: ${MEDIA_USER_MAX_BYTES}
      MEDIA_ORPHAN_GRACE_PERIOD: ${MEDIA_ORPHAN_GRACE_PERIOD}
      MEDIA_CLEANUP_INTERVAL: ${MEDIA_CLEANUP_INTERVAL}
      MEDIA_CLEANUP_BATCH_SIZE: ${MEDIA_CLEANUP_BATCH_SIZE}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      AUTH_BOOTSTRAP_MODE: ${AUTH_BOOTSTRAP_MODE}
      OAUTH_TRUST_X_REAL_IP: ${OAUTH_TRUST_X_REAL_IP}
      OAUTH_RATE_LIMIT_AT_EDGE: ${OAUTH_RATE_LIMIT_AT_EDGE}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI}
      YANDEX_ALLOWED_USERS: ${YANDEX_ALLOWED_USERS}
      OBSERVABILITY_ADMIN_USERS: ${OBSERVABILITY_ADMIN_USERS}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL}
      WORKSPACE_MAX_OWNED_TEAM_WORKSPACES: ${WORKSPACE_MAX_OWNED_TEAM_WORKSPACES}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_WEBHOOK_SECRET: ${MAX_WEBHOOK_SECRET}
      MAX_CA_CERT_FILE: ${MAX_CA_CERT_FILE}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_RESEARCH_MODEL: ${OPENAI_RESEARCH_MODEL}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL}
      AI_GLOBAL_MAX_CONCURRENT: ${AI_GLOBAL_MAX_CONCURRENT}
      AI_USER_MAX_CONCURRENT: ${AI_USER_MAX_CONCURRENT}
      AI_IMAGE_PER_MINUTE: ${AI_IMAGE_PER_MINUTE}
      AI_IMAGE_PER_DAY: ${AI_IMAGE_PER_DAY}
      AI_RESEARCH_PER_MINUTE: ${AI_RESEARCH_PER_MINUTE}
      AI_RESEARCH_PER_DAY: ${AI_RESEARCH_PER_DAY}
      AI_LEASE_TTL: ${AI_LEASE_TTL}
      BILLING_ENFORCEMENT_ENABLED: ${BILLING_ENFORCEMENT_ENABLED}
      SCHEDULER_INTERVAL: ${SCHEDULER_INTERVAL}
    expose:
      - "8080"
    volumes:
      - media-data:/app/media
      - ../certs:/app/certs:ro
    tmpfs:
      - /tmp:size=256m,mode=1777
    read_only: true
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 10s
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      edge:
        aliases:
          - backend
          - maxposty-backend
      pool:
      monitoring:

  monitoring-role:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: "no"
    entrypoint: ["/usr/local/bin/configure-monitoring-role"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_OWNER_USER: ${POSTGRES_OWNER_USER}
      POSTGRES_OWNER_PASSWORD: ${POSTGRES_OWNER_PASSWORD}
      POSTGRES_MONITOR_USER: ${POSTGRES_MONITOR_USER}
      POSTGRES_MONITOR_PASSWORD: ${POSTGRES_MONITOR_PASSWORD}
    volumes:
      - ../docker/postgres/configure-monitoring-role.sh:/usr/local/bin/configure-monitoring-role:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - database

  postgres-exporter:
    image: ghcr.io/artemmakolov1/maxposty-postgres-exporter:v0.20.1-go1.26.5.1@sha256:526d3ff7f8276026715ca822d221bba0763dfea24fae7b8fa53ae1d9d3062934
    restart: unless-stopped
    command:
      - --collector.long_running_transactions
      - --collector.stat_statements
      - --collector.stat_statements.limit=25
      # Export only normalized application SQL templates. Owner/monitor
      # statements are excluded so role setup and exporter queries cannot
      # leak credentials into Prometheus labels.
      - --collector.stat_statements.include_query
      - --collector.stat_statements.query_length=300
      - --collector.stat_statements.exclude_users=${POSTGRES_OWNER_USER},${POSTGRES_MONITOR_USER}
      - --log.level=warn
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_MONITOR_USER}
      DATA_SOURCE_PASS: ${POSTGRES_MONITOR_PASSWORD}
    expose:
      - "9187"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      monitoring-role:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9187/metrics"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    logging: *default-logging
    networks:
      - database
      - monitoring

  pgbouncer-exporter:
    image: ghcr.io/artemmakolov1/maxposty-pgbouncer-exporter:v0.12.1-go1.26.5.1@sha256:d03dc3a1b1d4c40c1a92edc00b8cd262e4c1e7aeabfda971aeb511583ab46ede
    restart: unless-stopped
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: postgresql://${POSTGRES_MONITOR_USER}:${POSTGRES_MONITOR_PASSWORD}@pgbouncer:6432/pgbouncer?sslmode=disable
    expose:
      - "9127"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9127/metrics"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    logging: *default-logging
    networks:
      - pool
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
      - --collector.netdev.device-exclude=^(veth.*|docker.*|br-.*)$
      - --collector.textfile.directory=/var/lib/node-exporter/textfile
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
      - /opt/maxposty/backend/runtime/metrics:/var/lib/node-exporter/textfile:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9100/metrics"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 5s
    logging: *default-logging
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --data.retention=120h
      - --log.level=warn
    expose:
      - "9093"
    volumes:
      - alertmanager-config:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      runtime-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    logging: *default-logging
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=5GB
      - --log.level=warn
    expose:
      - "9090"
    # SSH-only break-glass access remains available when the application auth
    # path or database is down; it is never bound to a public interface.
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
      postgres-exporter:
        condition: service_healthy
      pgbouncer-exporter:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    logging: *default-logging
    networks:
      - monitoring

  grafana:
    # The stable 13.1.0 image was blocked by the release CVE gate. This clean
    # official build is pinned by digest, so the mutable nightly tag can never
    # change what production pulls.
    image: grafana/grafana:nightly-slim@sha256:951d45bbdb8a2e909fa1315b12a7bc3f7be3835e076e40ecf304888f426b6179
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_DATA_SOURCE_PROXY_WHITELIST: prometheus:9090
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_HEADERS: Role:X-WEBAUTH-ROLE
      # Caddy is the only network peer allowed to assert a user identity.
      # Loopback is included solely for the authenticated deployment smoke
      # check that verifies provisioned dashboards and the datasource.
      GF_AUTH_PROXY_WHITELIST: 172.29.42.10,127.0.0.1
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
    expose:
      - "3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    tmpfs:
      - /tmp:size=64m,mode=1777
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/monitoring/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    logging: *default-logging
    networks:
      monitoring_edge:
        ipv4_address: 172.29.42.20
        aliases:
          - grafana
          - maxposty-grafana
      monitoring:

  setup-max-webhook:
    image: ${BACKEND_IMAGE}
    profiles: ["ops"]
    restart: "no"
    entrypoint: ["/app/setup-max-webhook"]
    environment:
      MAX_API_BASE_URL: ${MAX_API_BASE_URL}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_WEBHOOK_URL: ${MAX_WEBHOOK_URL}
      MAX_WEBHOOK_SECRET: ${MAX_WEBHOOK_SECRET}
      MAX_CA_CERT_FILE: ${MAX_CA_CERT_FILE}
    volumes:
      - ../certs:/app/certs:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - edge

  media-backup:
    image: ${BACKEND_IMAGE}
    profiles: ["ops"]
    restart: "no"
    entrypoint: ["/bin/tar"]
    volumes:
      - media-data:/source:ro
    network_mode: "none"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

volumes:
  postgres-data:
  postgres-wal-archive:
  postgres-base-backups:
  media-data:
  prometheus-data:
  alertmanager-data:
  alertmanager-config:
  grafana-data:

networks:
  edge:
    name: maxposty-edge
    external: true
  monitoring_edge:
    name: maxposty-monitoring-edge
    external: true
  pool:
    internal: true
  database:
    internal: true
  monitoring:
    internal: true
