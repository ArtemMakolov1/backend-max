name: Backend Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulnerabilities:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.12"
          cache: true
      - name: Install govulncheck v1.6.0
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Scan reachable Go vulnerabilities
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  repository-scan:
    name: Repository secrets and high-risk misconfiguration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Block exposed secrets and high-risk configuration findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, post-2026 incident immutable commit
        with:
          scan-type: fs
          scan-ref: .
          version: v0.72.0
          scanners: secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          timeout: 10m

  monitoring-images:
    name: Monitoring image scan (${{ matrix.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: postgres-exporter
            image: "ghcr.io/artemmakolov1/maxposty-postgres-exporter:v0.20.1-go1.26.5.1@sha256:526d3ff7f8276026715ca822d221bba0763dfea24fae7b8fa53ae1d9d3062934"
            trivyignores: ""
          - component: pgbouncer-exporter
            image: "ghcr.io/artemmakolov1/maxposty-pgbouncer-exporter:v0.12.1-go1.26.5.1@sha256:d03dc3a1b1d4c40c1a92edc00b8cd262e4c1e7aeabfda971aeb511583ab46ede"
            trivyignores: ""
          - component: node-exporter
            image: "prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0"
            trivyignores: ""
          - component: prometheus
            image: "prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893"
            trivyignores: ".github/trivy/monitoring-images.yaml"
          - component: grafana
            image: "grafana/grafana:nightly-slim@sha256:951d45bbdb8a2e909fa1315b12a7bc3f7be3835e076e40ecf304888f426b6179"
            trivyignores: ".github/trivy/monitoring-images.yaml"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log in for private MaxPosty monitoring images
        if: ${{ startsWith(matrix.image, 'ghcr.io/') }}
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
      - name: Block fixed high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, post-2026 incident immutable commit
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          version: v0.72.0
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          trivyignores: ${{ matrix.trivyignores }}
          exit-code: "1"
          format: table
          timeout: 10m
      - name: Remove registry credentials
        if: ${{ always() && startsWith(matrix.image, 'ghcr.io/') }}
        shell: bash
        run: docker logout ghcr.io >/dev/null 2>&1 || true

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.12"
          cache: true
      - name: Verify dependency checksums and module graph
        run: |
          go mod verify
          go list -mod=readonly -m all >/dev/null

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.12"
          cache: true
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go
          build-mode: manual
          queries: security-extended
      - name: Build for CodeQL
        run: go build ./...
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:go

  release-security-gate:
    name: Release security gate
    if: ${{ always() }}
    needs: [vulnerabilities, repository-scan, monitoring-images, codeql]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every release security check
        shell: bash
        env:
          VULNERABILITIES_RESULT: ${{ needs.vulnerabilities.result }}
          REPOSITORY_SCAN_RESULT: ${{ needs.repository-scan.result }}
          MONITORING_IMAGES_RESULT: ${{ needs.monitoring-images.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        run: |
          set -euo pipefail
          [[ "$VULNERABILITIES_RESULT" == "success" ]]
          [[ "$REPOSITORY_SCAN_RESULT" == "success" ]]
          [[ "$MONITORING_IMAGES_RESULT" == "success" ]]
          [[ "$CODEQL_RESULT" == "success" ]]
