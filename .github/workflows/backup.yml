name: Backend production backup

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: maxposty-backend-production
  cancel-in-progress: false

jobs:
  backup:
    name: Verify, encrypt and publish production backup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production
      url: https://maxposty.ru
    env:
      VPS_HOST: ${{ vars.VPS_HOST || '178.159.94.83' }}
      VPS_PORT: ${{ vars.VPS_PORT || '22' }}
      VPS_USER: ${{ vars.VPS_USER || 'maxposty-deploy' }}
    steps:
      - name: Validate deployment target
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || { echo "Invalid VPS_HOST" >&2; exit 1; }
          [[ "$VPS_PORT" =~ ^[1-9][0-9]{0,4}$ ]] && (( VPS_PORT <= 65535 )) || { echo "Invalid VPS_PORT" >&2; exit 1; }
          [[ "$VPS_USER" =~ ^[a-z_][a-z0-9_-]*$ ]] || { echo "Invalid VPS_USER" >&2; exit 1; }
      - name: Configure pinned SSH host identity
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ -n "$VPS_SSH_PRIVATE_KEY" && -n "$VPS_SSH_KNOWN_HOSTS" ]] || { echo "Missing production SSH credentials" >&2; exit 1; }
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_deploy"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_deploy" "$HOME/.ssh/known_hosts"
      - name: Run accepted-release restore drill and encrypted backup
        shell: bash
        env:
          BACKUP_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(
            -i "$HOME/.ssh/id_deploy"
            -p "$VPS_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          printf '%s\n' "$BACKUP_TOKEN" | ssh "${ssh_options[@]}" "$target" \
            "exec /opt/maxposty/backend/current/deploy/backup/run-scheduled-backup.sh '$GITHUB_REPOSITORY'"
      - name: Remove runner credentials
        if: ${{ always() }}
        shell: bash
        run: rm -f "$HOME/.ssh/id_deploy" "$HOME/.ssh/known_hosts"
