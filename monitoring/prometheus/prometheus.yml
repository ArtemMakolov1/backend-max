global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    service: maxposty

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: maxposty-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: pgbouncer
    static_configs:
      - targets: ["pgbouncer-exporter:9127"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]
