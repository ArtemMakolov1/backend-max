openapi: 3.1.0
info:
  title: MaxPosty API
  version: 1.0.0
  description: |
    Canonical HTTP contract shared by the MaxPosty backend and frontend.
    Browser sessions are carried by the secure `maxstudio_session` cookie.
servers:
  - url: https://api.maxposty.ru/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local development
tags:
  - name: Authentication
  - name: Channels
  - name: Posts
  - name: Analytics
  - name: AI
  - name: Integration
  - name: Workspaces
  - name: Billing
  - name: Collaboration
  - name: Notifications
  - name: Brand
  - name: Campaigns
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return service and browser-session status
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        default:
          $ref: '#/components/responses/Problem'
  /plans:
    get:
      tags: [Billing]
      operationId: listPublicBillingPlans
      summary: List public and currently available plan versions
      description: Internal or unavailable future plans are never returned.
      responses:
        '200':
          description: Public Free, Author and Team plan catalog
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/BillingCatalogEntry'}
        default: {$ref: '#/components/responses/Problem'}
  /webhooks/yookassa:
    post:
      tags: [Billing]
      operationId: receiveYooKassaWebhook
      summary: Receive a YooKassa payment status notification
      description: The payment object is always fetched canonically from YooKassa before reconciliation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event, object]
              properties:
                event:
                  type: string
                  enum: [payment.succeeded, payment.canceled, payment.waiting_for_capture]
                object:
                  type: object
                  required: [id]
                  properties:
                    id: {type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'}
      responses:
        '200':
          description: Notification acknowledged
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: {type: boolean}
        '400': {$ref: '#/components/responses/Problem'}
        '429': {$ref: '#/components/responses/Problem'}
        default: {$ref: '#/components/responses/Problem'}
  /auth/yandex/start:
    post:
      tags: [Authentication]
      operationId: startYandexLogin
      summary: Start Yandex ID login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginStart'
      responses:
        '200':
          description: Authorization URL
          content:
            application/json:
              schema:
                type: object
                required: [authorization_url]
                properties:
                  authorization_url:
                    type: string
                    format: uri
        default:
          $ref: '#/components/responses/Problem'
  /auth/max/start:
    post:
      tags: [Authentication]
      operationId: startMaxLogin
      summary: Start MAX contact login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginStart'
      responses:
        '201':
          description: Login attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxLoginAttempt'
        default:
          $ref: '#/components/responses/Problem'
  /auth/max/{request_id}/complete:
    parameters:
      - $ref: '#/components/parameters/RequestId'
    post:
      tags: [Authentication]
      operationId: completeMaxLogin
      summary: Poll a MAX contact login attempt
      responses:
        '200':
          description: Current login attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxLoginAttempt'
        default:
          $ref: '#/components/responses/Problem'
  /auth/max/{request_id}:
    parameters:
      - $ref: '#/components/parameters/RequestId'
    delete:
      tags: [Authentication]
      operationId: cancelMaxLogin
      summary: Cancel a MAX login attempt
      responses:
        '204':
          description: Attempt cancelled
        default:
          $ref: '#/components/responses/Problem'
  /auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Close the browser session
      responses:
        '204':
          description: Session closed
        default:
          $ref: '#/components/responses/Problem'
  /channels:
    get:
      tags: [Channels]
      operationId: listChannels
      summary: List channels owned by the current user
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Channels
          content:
            application/json:
              schema:
                type: object
                required: [channels]
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/Channel'
        default:
          $ref: '#/components/responses/Problem'
  /channels/discoverable:
    get:
      tags: [Channels]
      operationId: listDiscoverableChannels
      summary: List channels associated with the linked MAX identity
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Discoverable channels
          content:
            application/json:
              schema:
                type: object
                required: [channels]
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoverableChannel'
        default:
          $ref: '#/components/responses/Problem'
  /channels/discoverable/refresh:
    post:
      tags: [Channels]
      operationId: refreshDiscoverableChannels
      summary: Refresh channel inventory from MAX
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverableChannelRefresh'
        default:
          $ref: '#/components/responses/Problem'
  /channels/connect/observed:
    post:
      tags: [Channels]
      operationId: connectDiscoverableChannel
      summary: Connect a verified discovered channel
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [max_chat_id]
              properties:
                max_chat_id:
                  type: string
      responses:
        '200':
          description: Connected channel
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
                  diagnostics:
                    $ref: '#/components/schemas/ChannelDiagnostics'
        default:
          $ref: '#/components/responses/Problem'
  /channels/connect/start:
    post:
      tags: [Channels]
      operationId: startChannelConnection
      summary: Start proof of channel ownership
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_chat_id:
                  type: string
                public_link:
                  type: string
                  format: uri
              minProperties: 1
      responses:
        '201':
          description: Channel connection claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelConnectionClaim'
        default:
          $ref: '#/components/responses/Problem'
  /channels/connect/{claim_id}:
    parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: string
          maxLength: 128
    get:
      tags: [Channels]
      operationId: getChannelConnection
      summary: Poll channel ownership proof
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelConnectionClaim'
        default:
          $ref: '#/components/responses/Problem'
  /channels/{id}/test:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Channels]
      operationId: testChannel
      summary: Verify the bot permissions for a channel
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResult'
        default:
          $ref: '#/components/responses/Problem'
  /channels/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Channels]
      operationId: deleteChannel
      summary: Disconnect a channel
      parameters:
        - name: delete_content
          in: query
          required: false
          description: Delete every local post and campaign item linked to the channel after explicit user confirmation.
          schema: {type: boolean, default: false}
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Channel disconnected
        default:
          $ref: '#/components/responses/Problem'
  /channels/{id}/max-info:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Channels]
      operationId: updateChannelMaxInfo
      summary: Change the channel photo and title in MAX itself
      description: >-
        Pushes a new icon and/or title to the MAX channel through the Bot API
        and refreshes the cached channel record. At least one of title or file
        is required. The channel description cannot be changed by bots.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title: {type: string, minLength: 1, maxLength: 200}
                file: {type: string, format: binary}
                notify:
                  type: boolean
                  default: false
                  description: Send a MAX system notification about the title or photo change.
      responses:
        '200':
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        default:
          $ref: '#/components/responses/Problem'
  /channels/{id}/description/suggest:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Channels, AI]
      operationId: suggestChannelDescription
      summary: Suggest three channel description variants
      description: >-
        Uses the channel profile and up to eight recent published posts as
        untrusted editorial context. Nothing is saved or pushed to MAX.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelDescriptionSuggestionInput'
      responses:
        '200':
          description: Suggested descriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelDescriptionSuggestions'
        default:
          $ref: '#/components/responses/Problem'
  /analytics:
    get:
      tags: [Analytics]
      operationId: getAnalytics
      summary: Return channel analytics for a date range
      security:
        - sessionCookie: []
      parameters:
        - name: channel_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Analytics report
          content:
            application/json:
              schema:
                type: object
                required: [analytics]
                properties:
                  analytics:
                    $ref: '#/components/schemas/ChannelAnalytics'
        default:
          $ref: '#/components/responses/Problem'
  /posts:
    get:
      tags: [Posts]
      operationId: listPosts
      summary: List posts in the current workspace
      security:
        - sessionCookie: []
      parameters:
        - name: channel_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PostStatus'
      responses:
        '200':
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Posts]
      operationId: createPost
      summary: Create a draft
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditablePost'
      responses:
        '201':
          description: Created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/format-content:
    post:
      tags: [AI]
      operationId: formatPostContent
      summary: Format plain text while preserving meaning
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, format]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 4000
                format:
                  $ref: '#/components/schemas/PostFormat'
      responses:
        '200':
          description: Formatted content
          content:
            application/json:
              schema:
                type: object
                required: [content]
                properties:
                  content:
                    type: string
        default:
          $ref: '#/components/responses/Problem'
  /posts/suggest-image-prompt:
    post:
      tags: [AI]
      operationId: suggestImagePrompt
      summary: Suggest an image prompt from the post text
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestImagePromptInput'
      responses:
        '200':
          description: Suggested image prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestedImagePrompt'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Posts]
      operationId: getPost
      summary: Get one post
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        default:
          $ref: '#/components/responses/Problem'
    put:
      tags: [Posts]
      operationId: replacePost
      summary: Save editable post fields
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Saved post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Posts]
      operationId: updatePost
      summary: Save selected editable post fields
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Saved post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Posts]
      operationId: deletePost
      summary: Delete a local post
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Post deleted
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/duplicate:
    post:
      tags: [Posts]
      operationId: duplicatePost
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '201':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/generate-image:
    post:
      tags: [AI]
      operationId: generatePostImage
      summary: Generate and attach a post image
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePostImageInput'
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/image:
    post:
      tags: [Posts]
      operationId: uploadPostImage
      summary: Upload and attach an image
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/attachments:
    post:
      tags: [Posts]
      operationId: uploadPostAttachment
      summary: Upload one image or video into the ordered post gallery
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [image, video]
                  description: Inferred from the filename when omitted.
                position:
                  type: integer
                  minimum: 0
                  maximum: 11
                  description: Zero-based insertion position; appends when omitted.
      responses:
        '201':
          $ref: '#/components/responses/PostAttachmentMutation'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/attachments/{attachment_id}:
    put:
      tags: [Posts]
      operationId: replacePostAttachment
      summary: Replace one attachment while preserving its id and position
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/AttachmentId'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [image, video]
                  description: Inferred from the filename when omitted.
      responses:
        '200':
          $ref: '#/components/responses/PostAttachmentMutation'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Posts]
      operationId: deletePostAttachment
      summary: Remove one attachment and compact the remaining order
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/AttachmentId'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/attachments/order:
    patch:
      tags: [Posts]
      operationId: reorderPostAttachments
      summary: Replace the complete attachment order
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attachment_ids]
              properties:
                attachment_ids:
                  type: array
                  maxItems: 12
                  uniqueItems: true
                  items:
                    type: integer
                    format: int64
                    minimum: 1
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/publish:
    post:
      tags: [Posts]
      operationId: publishPost
      summary: Publish a post immediately
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/schedule:
    post:
      tags: [Posts]
      operationId: schedulePost
      summary: Schedule a post for a future time
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduled_at]
              properties:
                scheduled_at:
                  type: string
                  format: date-time
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
    put:
      tags: [Posts]
      operationId: schedulePostPut
      summary: Schedule a post for a future time
      description: Legacy alias for POST /posts/{id}/schedule.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduled_at]
              properties:
                scheduled_at:
                  type: string
                  format: date-time
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Posts]
      operationId: deletePostSchedule
      summary: Cancel a scheduled post
      description: Legacy alias for POST /posts/{id}/cancel-schedule.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/cancel-schedule:
    post:
      tags: [Posts]
      operationId: cancelPostSchedule
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/update-published:
    post:
      tags: [Posts]
      operationId: updatePublishedPost
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/sync:
    post:
      tags: [Posts]
      operationId: syncPost
      description: Legacy alias for POST /posts/{id}/update-published.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/sync-max:
    post:
      tags: [Posts]
      operationId: syncMaxPost
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/pin:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Posts]
      operationId: pinPost
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Posts]
      operationId: unpinPost
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/publication:
    delete:
      tags: [Posts]
      operationId: deletePublication
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /posts/{id}/delete-publication:
    post:
      tags: [Posts]
      operationId: deletePublicationPost
      description: Legacy alias for DELETE /posts/{id}/publication.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/Id'
      security:
        - sessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/Post'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces available to the current user with authoritative capabilities
      security: [{sessionCookie: []}]
      responses:
        '200': {$ref: '#/components/responses/WorkspaceList'}
        default: {$ref: '#/components/responses/Problem'}
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a team workspace
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
