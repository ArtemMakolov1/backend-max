        posts: {type: integer, minimum: 0}
        views_per_1k_audience: {type: [number, 'null'], format: double, minimum: 0}
        views_per_hour: {type: [number, 'null'], format: double, minimum: 0}
        score: {type: [number, 'null'], format: double, minimum: 0}
    AnalyticsBestTime:
      type: object
      required: [weekday, hour, sample_size, views_per_1k_audience, views_per_hour, score, next_at]
      properties:
        weekday: {type: integer, minimum: 0, maximum: 6}
        hour: {type: integer, minimum: 0, maximum: 23}
        sample_size: {type: integer, minimum: 1}
        views_per_1k_audience: {type: [number, 'null'], format: double, minimum: 0}
        views_per_hour: {type: [number, 'null'], format: double, minimum: 0}
        score: {type: number, format: double, minimum: 0}
        next_at: {type: string, format: date-time}
    WorkspaceContentAnalytics:
      type: object
      required: [scope, channel, period, summary, daily, posts, heatmap, best_time, timezone_offset_minutes]
      properties:
        scope: {$ref: '#/components/schemas/AnalyticsContentScope'}
        channel: {$ref: '#/components/schemas/AnalyticsChannelSummary'}
        period: {$ref: '#/components/schemas/AnalyticsPeriod'}
        summary: {$ref: '#/components/schemas/AnalyticsContentSummary'}
        daily:
          type: array
          items: {$ref: '#/components/schemas/AnalyticsDailyPoint'}
        posts:
          type: array
          items: {$ref: '#/components/schemas/AnalyticsContentPost'}
        heatmap:
          type: array
          minItems: 168
          maxItems: 168
          items: {$ref: '#/components/schemas/AnalyticsHeatmapCell'}
        best_time:
          oneOf:
            - {$ref: '#/components/schemas/AnalyticsBestTime'}
            - {type: 'null'}
        timezone_offset_minutes: {type: integer, minimum: -840, maximum: 840}
    WorkspaceContentAnalyticsEnvelope:
      type: object
      required: [analytics]
      properties:
        analytics: {$ref: '#/components/schemas/WorkspaceContentAnalytics'}
    WorkspacePostAnalyticsPost:
      type: object
      required:
        - id
        - title
        - channel_id
        - channel_title
        - published_at
        - publication_state
        - removed_from_max
        - max_message_url
        - max_stats_synced_at
      properties:
        id: {type: integer, format: int64, minimum: 1}
        title: {type: string}
        channel_id: {type: [integer, 'null'], format: int64, minimum: 1}
        channel_title: {type: string}
        published_at: {type: [string, 'null'], format: date-time}
        publication_state: {type: string, enum: [published, removed, unpublished]}
        removed_from_max: {type: boolean}
        max_message_url: {type: string}
        max_stats_synced_at: {type: [string, 'null'], format: date-time}
    WorkspacePostAnalyticsSummary:
      type: object
      required:
        - views
        - views_change
        - audience
        - audience_source
        - views_per_1k_audience
        - lifetime_views_per_hour
        - observed_views_per_hour
        - observations
        - first_observed_at
        - last_observed_at
        - correction_detected
        - series_truncated
      properties:
        views: {type: [integer, 'null'], format: int64, minimum: 0}
        views_change:
          type: [integer, 'null']
          format: int64
          description: Difference between the first and last returned comparable observations; the first point can be the anchor immediately before period.from.
        audience: {type: [integer, 'null'], format: int64, minimum: 0}
        audience_source: {type: string, enum: [snapshot_at_publish, current_channel, missing]}
        views_per_1k_audience: {type: [number, 'null'], format: double, minimum: 0}
        lifetime_views_per_hour: {type: [number, 'null'], format: double, minimum: 0}
        observed_views_per_hour:
          type: [number, 'null']
          format: double
          minimum: 0
          description: Average observed growth rate; null when the series contains any counter correction.
        observations:
          type: integer
          minimum: 0
          maximum: 1000
          description: Number of returned series points, including the optional pre-period anchor.
        first_observed_at:
          type: [string, 'null']
          format: date-time
          description: Timestamp of the first returned point, which can precede period.from when it is the anchor.
        last_observed_at: {type: [string, 'null'], format: date-time}
        correction_detected: {type: boolean}
        series_truncated:
          type: boolean
          description: True when older observations were omitted and summary window metrics use only the returned series.
    WorkspacePostAnalyticsSeriesPoint:
      type: object
      required: [captured_at, views, delta, interval_views_per_hour, correction]
      properties:
        captured_at: {type: string, format: date-time}
        views: {type: integer, format: int64, minimum: 0}
        delta: {type: [integer, 'null'], format: int64}
        interval_views_per_hour: {type: [number, 'null'], format: double, minimum: 0}
        correction: {type: boolean}
    WorkspacePostAnalytics:
      type: object
      required: [post, period, summary, series]
      properties:
        post: {$ref: '#/components/schemas/WorkspacePostAnalyticsPost'}
        period: {$ref: '#/components/schemas/AnalyticsPeriod'}
        summary: {$ref: '#/components/schemas/WorkspacePostAnalyticsSummary'}
        series:
          type: array
          maxItems: 1000
          description: Up to 1000 points ordered by captured_at ascending; the first point can be the latest same-publication anchor immediately before period.from, and it counts toward the limit.
          items: {$ref: '#/components/schemas/WorkspacePostAnalyticsSeriesPoint'}
    WorkspacePostAnalyticsEnvelope:
      type: object
      required: [analytics]
      properties:
        analytics: {$ref: '#/components/schemas/WorkspacePostAnalytics'}
    AnalyticsVariationResult:
      type: object
      required: [post]
      properties:
        post: {$ref: '#/components/schemas/Post'}
    AnalyticsRepeatInput:
      type: object
      required: [planned_at]
      properties:
        planned_at: {type: string, format: date-time}
    AnalyticsRepeatResult:
      type: object
      required: [post, planned_at, requires_approval, campaign_id, variant_id, campaign]
      properties:
        post: {$ref: '#/components/schemas/Post'}
        planned_at: {type: string, format: date-time}
        requires_approval: {type: boolean}
        campaign_id: {type: string}
        variant_id: {type: string}
        campaign: {$ref: '#/components/schemas/Campaign'}
    CalendarItem:
      type: object
      required: [id, kind, channel_id, channel_title, title, occurs_at, status]
      properties:
        id: {type: string}
        kind: {type: string, enum: [post, campaign_variant]}
        campaign_id: {type: string}
        variant_id: {type: string}
        post_id: {type: integer, format: int64, minimum: 1}
        channel_id: {type: integer, format: int64, minimum: 1}
        channel_title: {type: string}
        title: {type: string}
        occurs_at: {type: string, format: date-time}
        status: {type: string}
        review_status: {type: string}
        post_updated_at: {type: string, format: date-time}
        variant_updated_at: {type: string, format: date-time}
    CalendarRescheduleInput:
      type: object
      required: [scheduled_at, expected_updated_at]
      properties:
        scheduled_at: {type: string, format: date-time}
        expected_updated_at: {type: string, format: date-time}
    CampaignVariant:
      type: object
      required:
