                $ref: '#/components/schemas/TestResult'
        default:
          $ref: '#/components/responses/Problem'
  /integrations/max:
    get:
      tags: [Integration]
      operationId: getMaxIntegrationLegacy
      description: Legacy alias for GET /integration/max.
      deprecated: true
      security:
        - sessionCookie: []
      responses:
        '200':
          description: MAX integration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationStatus'
        default:
          $ref: '#/components/responses/Problem'
  /integrations/max/test:
    post:
      tags: [Integration]
      operationId: testMaxIntegrationLegacy
      description: Legacy alias for POST /integration/max/test.
      deprecated: true
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Integration test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResult'
        default:
          $ref: '#/components/responses/Problem'
  /integration/max/identity:
    get:
      tags: [Integration]
      operationId: getMaxIdentity
      security:
        - sessionCookie: []
      responses:
        '200':
          description: MAX identity status
          content:
            application/json:
              schema:
                type: object
                required: [identity]
                properties:
                  identity:
                    $ref: '#/components/schemas/MaxIdentity'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Integration]
      operationId: startMaxIdentityLink
      security:
        - sessionCookie: []
      responses:
        '201':
          description: MAX identity link attempt
          content:
            application/json:
              schema:
                type: object
                required: [identity]
                properties:
                  identity:
                    $ref: '#/components/schemas/MaxIdentity'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: maxstudio_session
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    RequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_-]+$'
    AttachmentId:
      name: attachment_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 128}
    UserId:
      name: user_id
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 256}
    InvitationId:
      name: invitation_id
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 128}
    InvitationToken:
      name: token
      in: path
      required: true
      schema: {type: string, minLength: 32, maxLength: 256}
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
    ClaimId:
      name: claim_id
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 128}
    PostId:
      name: post_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
    RevisionId:
      name: revision_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
    CommentId:
      name: comment_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
    NotificationId:
      name: notification_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
    Filename:
      name: filename
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 512}
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 50}
    BeforeId:
      name: before_id
      in: query
      schema: {type: integer, format: int64, minimum: 1}
  responses:
    Problem:
      description: Request failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemEnvelope'
    Post:
      description: Updated post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Post'
    PostAttachment:
      description: Uploaded or replaced attachment
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PostAttachment'
    PostAttachmentMutation:
      description: Uploaded or replaced attachment together with the latest post revision
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PostAttachmentMutation'
    WorkspaceEnvelope:
      description: Workspace and authoritative access context
      content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceEnvelope'}}}
    WorkspaceBilling:
      description: Workspace billing state with owner-scoped actions
      content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceBilling'}}}
    WorkspaceList:
      description: Available workspaces
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/WorkspaceEnvelope'}}}}
    WorkspaceMember:
      description: Workspace member
      content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceMember'}}}
    WorkspaceMemberList:
      description: Workspace members
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/WorkspaceMember'}}}}
    WorkspaceInvitationList:
      description: Workspace invitations without bearer secrets
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/WorkspaceInvitation'}}}}
    WorkspaceInvitationSecret:
      description: Newly created invitation with one-time bearer token
      content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceInvitationSecret'}}}
    Channel:
      description: Workspace channel
      content: {application/json: {schema: {$ref: '#/components/schemas/Channel'}}}
    ChannelList:
      description: Workspace channels
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Channel'}}}}
    ChannelConnectionClaim:
      description: Channel ownership verification claim
      content: {application/json: {schema: {$ref: '#/components/schemas/ChannelConnectionClaim'}}}
    PostList:
      description: Workspace posts
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Post'}}}}
    MediaFile:
      description: Private workspace media metadata
      content: {application/json: {schema: {$ref: '#/components/schemas/MediaFile'}}}
    PostRevisionList:
      description: Immutable post revisions
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PostRevision'}}}}
    PostReviewSubmission:
      description: Submitted current revision
      content: {application/json: {schema: {$ref: '#/components/schemas/PostReviewSubmission'}}}
    PostReview:
      description: Review decision
      content: {application/json: {schema: {$ref: '#/components/schemas/PostReview'}}}
    PostReviewList:
      description: Review decisions
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PostReview'}}}}
    PostComment:
      description: Post comment
      content: {application/json: {schema: {$ref: '#/components/schemas/PostComment'}}}
    PostCommentList:
      description: Post comments
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PostComment'}}}}
    AuditEventList:
      description: Workspace audit events
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}}}
    Notification:
      description: User notification
      content: {application/json: {schema: {$ref: '#/components/schemas/Notification'}}}
    NotificationList:
      description: User notifications
      content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Notification'}}}}
  schemas:
    ProblemEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Problem'
    Problem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
    LoginStart:
      type: object
      required: [return_to, terms_accepted, personal_data_accepted]
      properties:
        return_to:
          type: string
          maxLength: 1024
        terms_accepted:
          type: boolean
          const: true
        personal_data_accepted:
          type: boolean
          const: true
    AuthMethod:
      type: string
      enum: [none, yandex, max]
    AuthProvider:
      type: string
      enum: [yandex, max]
    AuthUser:
      type: object
      required: [id, provider, display_name]
      properties:
        id:
          type: string
        provider:
          $ref: '#/components/schemas/AuthProvider'
        display_name:
          type: string
        login:
          type: string
        avatar_url:
          type: string
          format: uri
    HealthStatus:
      type: object
      required:
        - status
        - max_configured
        - openai_configured
        - auth_required
        - authenticated
      properties:
        status:
          type: string
          const: ok
        max_configured:
          type: boolean
        openai_configured:
          type: boolean
        research_configured:
          type: boolean
        content_formatting_configured:
          type: boolean
        observability_access:
          type: boolean
        auth_required:
          type: boolean
        authenticated:
          type: boolean
        auth_methods:
          type: object
          properties:
            yandex:
              type: boolean
            max:
              type: boolean
        auth_method:
          $ref: '#/components/schemas/AuthMethod'
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
        session_expires_at:
          type: [string, 'null']
          format: date-time
    MaxLoginStatus:
      type: string
      enum: [pending, awaiting_contact, authenticated, expired, canceled, failed]
    MaxLoginAttempt:
      type: object
      required: [request_id, status]
      properties:
        request_id:
          type: string
        status:
          $ref: '#/components/schemas/MaxLoginStatus'
        bot_url:
          type: [string, 'null']
          format: uri
        comparison_code:
          type: [string, 'null']
          pattern: '^\d{6}$'
        expires_at:
          type: [string, 'null']
          format: date-time
        error_code:
          type: [string, 'null']
        message:
          type: [string, 'null']
        is_new_user:
          type: boolean
          description: True only in the response that creates a new local account.
    WorkspaceCapability:
      type: string
      enum:
        - workspace.read
        - workspace.update
        - workspace.delete
        - members.read
        - members.manage
        - invitations.read
        - invitations.manage
        - channels.read
        - channels.manage
        - posts.read
        - posts.write
        - posts.delete
        - media.read
        - media.write
        - ai.use
        - comments.read
        - comments.write
        - comments.resolve
        - review.submit
        - review.decide
        - posts.publish
        - audit.read
        - notifications.read
        - notifications.manage
    WorkspaceRole:
      type: string
      enum: [owner, editor, approver, viewer]
    Workspace:
      type: object
      required:
        - id
        - name
        - owner_user_id
        - is_personal
        - approval_required
        - require_distinct_approver
        - created_at
        - updated_at
      properties:
        id: {type: string}
        name: {type: string, minLength: 1, maxLength: 120}
        owner_user_id: {type: string}
        is_personal: {type: boolean}
        approval_required: {type: boolean}
        require_distinct_approver: {type: boolean}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        archived_at: {type: [string, 'null'], format: date-time}
    WorkspaceAccess:
      type: object
      required: [workspace_id, role, capabilities]
      properties:
        workspace_id: {type: string}
        role: {$ref: '#/components/schemas/WorkspaceRole'}
        capabilities:
          type: array
          uniqueItems: true
          items: {$ref: '#/components/schemas/WorkspaceCapability'}
    WorkspaceEnvelope:
      type: object
      required: [workspace, access]
      properties:
        workspace: {$ref: '#/components/schemas/Workspace'}
        access: {$ref: '#/components/schemas/WorkspaceAccess'}
    BillingPlan:
      type: object
      required:
        - code
        - version
        - catalog_version
        - name
        - description
        - currency_code
        - monthly_price_minor
        - billing_interval
        - public
        - available
      properties:
        code: {type: string, pattern: '^[a-z][a-z0-9_]{0,31}$'}
        version: {type: integer, minimum: 1}
        catalog_version: {type: string, format: date}
        name: {type: string, minLength: 1}
        description: {type: string}
        currency_code: {type: string, pattern: '^[A-Z]{3}$', example: RUB}
        monthly_price_minor:
          type: integer
          format: int64
          minimum: 0
          description: Monthly price in minor currency units; kopecks for RUB.
        billing_interval: {type: string, enum: [month]}
        public: {type: boolean}
        available: {type: boolean}
    BillingEntitlement:
      type: object
      required: [key, usage_metric, limit, limit_base_units, unit, period, unit_scale, hard_limit]
      properties:
        key: {type: string, pattern: '^[a-z][a-z0-9_]{0,63}$'}
        usage_metric:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,63}$'
          description: Base-unit metric used by the usage ledger.
        limit: {type: integer, format: int64, minimum: 0}
        limit_base_units:
          type: integer
          format: int64
          minimum: 0
          description: limit multiplied by unit_scale; authoritative for hard enforcement.
        unit:
          type: string
          description: User-facing unit such as channel, seat, byte, request or medium_equivalent_image.
        period: {type: string, enum: [current, month]}
        unit_scale:
          type: integer
          format: int64
          minimum: 1
          description: |
            Ledger base units in one displayed unit. ai_images_monthly uses 9:
            low=1 credit, medium/default=9 and high=36.
        hard_limit: {type: boolean}
    BillingCatalogEntry:
      type: object
      required:
        - plan
        - entitlements
        - checkout_enabled
        - recurring_consent_text
        - recurring_consent_version
        - recurring_consent_terms_version
        - recurring_consent_terms_url
      properties:
        plan: {$ref: '#/components/schemas/BillingPlan'}
        checkout_enabled:
          type: boolean
          description: Default-off server capability; false keeps pricing visible without accepting payments.
        recurring_consent_text:
          type: string
          description: Authoritative text that must be shown verbatim before a paid recurring checkout; empty for Free.
        recurring_consent_version:
          type: string
          description: Must be echoed in BillingCheckoutRequest; empty for Free.
        recurring_consent_terms_version:
          type: string
          description: Version of the linked terms used as consent evidence; empty for Free.
        recurring_consent_terms_url:
          type: string
          description: Absolute terms URL used as consent evidence; empty for Free.
        entitlements:
          type: array
          items: {$ref: '#/components/schemas/BillingEntitlement'}
    WorkspaceSubscription:
      type: object
      required: [plan, status, started_at, updated_at]
      properties:
        plan: {$ref: '#/components/schemas/BillingPlan'}
        status: {type: string, enum: [active, trialing, paused, canceled]}
        started_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    WorkspaceUsageMetric:
      type: object
      required: [metric, quantity, period]
      properties:
        metric:
          type: string
          description: Includes ai_image_credits, ai_research_requests and ai_format_requests.
        quantity: {type: integer, format: int64, minimum: 0}
        period: {type: string, enum: [current, month]}
        period_start: {type: string, format: date-time}
        period_end: {type: string, format: date-time}
    ImageCreditCosts:
      type: object
      required: [low, medium, high]
      description: |
        ai_image_credits charged per generated image for each
        GenerateImageInput quality. An omitted quality is charged as medium
        and auto is charged as high.
      properties:
        low: {type: integer, format: int64, minimum: 1}
        medium: {type: integer, format: int64, minimum: 1}
        high: {type: integer, format: int64, minimum: 1}
    BillingFeatures:
      type: object
      required: [ai_images, ai_research, ai_format, ai_channel_description, ai_brand_kit]
      properties:
        ai_images: {type: boolean}
        ai_research: {type: boolean}
        ai_format: {type: boolean}
        ai_channel_description: {type: boolean}
        ai_brand_kit: {type: boolean}
    BillingActions:
      type: object
      required: [can_checkout, can_cancel, can_resume, can_detach_payment_method]
      description: All fields are false for non-owners; live-dependent actions are false while checkout is disabled.
      properties:
        can_checkout: {type: boolean}
        can_cancel: {type: boolean}
        can_resume: {type: boolean}
        can_detach_payment_method: {type: boolean}
    BillingPaymentMethod:
      type: object
      required: [saved]
      properties:
        saved: {type: boolean}
    BillingContract:
      type: object
      required:
        - status
        - current_period_start
        - current_period_end
        - cancel_at_period_end
        - next_charge_at
        - retention_offer_used
        - next_period_discount_percent
        - payment_method
      properties:
        status: {type: string, enum: [active, past_due, ended]}
        current_period_start: {type: [string, 'null'], format: date-time}
        current_period_end: {type: [string, 'null'], format: date-time}
        cancel_at_period_end: {type: boolean}
        next_charge_at: {type: [string, 'null'], format: date-time}
        grace_until: {type: [string, 'null'], format: date-time}
        retention_offer_used: {type: boolean}
        next_period_discount_percent: {type: integer, minimum: 0, maximum: 50}
        payment_method: {$ref: '#/components/schemas/BillingPaymentMethod'}
    BillingCheckoutRequest:
      type: object
      additionalProperties: false
      required: [plan_code, recurring_consent, recurring_consent_version]
      properties:
        plan_code: {type: string, enum: [solo, pro]}
        recurring_consent:
          type: boolean
          const: true
        recurring_consent_version:
          type: string
          const: yookassa-recurring-v2
    BillingCheckout:
      type: object
      required: [checkout_id, status]
      properties:
        checkout_id: {type: string, pattern: '^[0-9a-f]{32}$'}
        status: {type: string, enum: [prepared, pending, succeeded, canceled, failed, manual_review]}
        confirmation_url:
          type: string
          format: uri
          description: Present only when the checkout requires a browser redirect.
    BillingIntentRequest:
      type: object
      additionalProperties: false
      required: [intent_token]
      properties:
        intent_token: {type: string, pattern: '^[0-9a-f]{64}$'}
    BillingRetentionOffer:
      type: object
      required: [eligible, discount_percent, applies_to_periods, regular_price_resumes_at, expires_at]
      properties:
        eligible: {type: boolean}
        discount_percent: {type: integer, const: 50}
        applies_to_periods: {type: integer, const: 1}
        regular_price_resumes_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
    BillingCancellationIntent:
      type: object
      required: [intent_token, current_period_end, retention_offer]
      properties:
        intent_token: {type: string, pattern: '^[0-9a-f]{64}$'}
        current_period_end: {type: string, format: date-time}
        retention_offer: {$ref: '#/components/schemas/BillingRetentionOffer'}
    BillingDetachPaymentMethodRequest:
      type: object
      additionalProperties: false
      required: [disable_autorenewal, confirmation]
      properties:
        disable_autorenewal: {type: boolean, const: true}
        confirmation: {type: boolean, const: true}
    WorkspaceBilling:
      type: object
      required:
        - workspace_id
        - subscription
        - entitlements
        - usage
        - features
        - contract
        - billing_actions
        - monthly_enforcement_enabled
        - checkout_enabled
        - image_credit_costs
      properties:
        workspace_id: {type: string}
        subscription: {$ref: '#/components/schemas/WorkspaceSubscription'}
        entitlements:
          type: array
          items: {$ref: '#/components/schemas/BillingEntitlement'}
        usage:
          type: array
          items: {$ref: '#/components/schemas/WorkspaceUsageMetric'}
        features: {$ref: '#/components/schemas/BillingFeatures'}
        contract:
          oneOf:
            - {$ref: '#/components/schemas/BillingContract'}
            - {type: 'null'}
        billing_actions: {$ref: '#/components/schemas/BillingActions'}
        monthly_enforcement_enabled:
          type: boolean
          description: False means observe-only; usage still increments atomically.
        checkout_enabled: {type: boolean}
        image_credit_costs: {$ref: '#/components/schemas/ImageCreditCosts'}
    WorkspaceCreate:
      type: object
      required: [name]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
    WorkspaceUpdate:
      type: object
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        approval_required: {type: boolean}
        require_distinct_approver: {type: boolean}
    WorkspaceTransfer:
      type: object
      required: [new_owner_user_id]
      properties:
        new_owner_user_id: {type: string, minLength: 1, maxLength: 256}
    WorkspaceMember:
      type: object
      required: [workspace_id, user_id, role, display_name, joined_at, updated_at]
      properties:
        workspace_id: {type: string}
        user_id: {type: string}
        role: {$ref: '#/components/schemas/WorkspaceRole'}
        display_name: {type: string}
        email:
          type: string
          format: email
          description: Present only when the caller has members.manage.
        avatar_url: {type: string}
        created_by: {type: string}
        joined_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    WorkspaceMemberCreate:
      type: object
      required: [user_id, role]
      properties:
        user_id: {type: string, minLength: 1, maxLength: 256}
        role: {type: string, enum: [editor, approver, viewer]}
    WorkspaceRoleUpdate:
      type: object
      required: [role]
      properties:
        role: {type: string, enum: [editor, approver, viewer]}
    WorkspaceInvitation:
      type: object
      required: [id, workspace_id, email, role, status, invited_by, created_at, expires_at]
      properties:
        id: {type: string}
        workspace_id: {type: string}
        email: {type: string}
        target_user_id: {type: string}
        role: {type: string, enum: [editor, approver, viewer]}
        status: {type: string, enum: [pending, accepted, revoked, expired]}
        invited_by: {type: string}
        accepted_by: {type: string}
        created_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        accepted_at: {type: [string, 'null'], format: date-time}
        revoked_at: {type: [string, 'null'], format: date-time}
    WorkspaceInvitationCreate:
      type: object
      required: [role]
      description: "email and target_user_id are mutually exclusive; omit both to create a bearer invitation."
      properties:
        email: {type: string, format: email, maxLength: 320}
        target_user_id: {type: string, maxLength: 256}
        role: {type: string, enum: [editor, approver, viewer]}
        expires_in_days: {type: integer, minimum: 1, maximum: 30, default: 7}
    WorkspaceInvitationSecret:
      type: object
      required: [invitation, token, accept_url]
      properties:
        invitation: {$ref: '#/components/schemas/WorkspaceInvitation'}
        token: {type: string, writeOnly: true}
        accept_url: {type: string, format: uri}
    ChannelConnectInput:
      type: object
      properties:
        public_link: {type: string, format: uri}
        max_chat_id: {type: string}
        title: {type: string, maxLength: 200}
      anyOf:
        - required: [public_link]
        - required: [max_chat_id]
    ChannelUpdate:
      type: object
      minProperties: 1
      properties:
        title: {type: string, minLength: 1, maxLength: 200}
        active: {type: boolean}
    FormatContentInput:
      type: object
      required: [content, format]
      properties:
        content: {type: string, minLength: 1, maxLength: 4000}
        format: {$ref: '#/components/schemas/PostFormat'}
    SuggestImagePromptInput:
      type: object
      required: [content]
      properties:
        content: {type: string, minLength: 1, maxLength: 4000}
