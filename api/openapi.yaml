        - campaign_id
        - channel_id
        - title
        - content
        - format
        - planned_at
        - status
        - created_by
        - created_at
        - updated_at
      properties:
        id: {type: string}
        workspace_id: {type: string}
        campaign_id: {type: string}
        channel_id: {type: integer, format: int64, minimum: 1}
        channel_title: {type: string}
        post_id: {type: integer, format: int64, minimum: 1}
        title: {type: string, maxLength: 200}
        content: {type: string, maxLength: 4000}
        format: {$ref: '#/components/schemas/PostFormat'}
        planned_at: {type: string, format: date-time}
        status: {type: string, enum: [planned, materialized, scheduled, published]}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        post_status: {type: string}
        review_status: {type: string}
        post_updated_at: {type: string, format: date-time}
    Campaign:
      type: object
