version: "2"

run:
  go: "1.25"
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - nilerr
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unused
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - common-false-positives

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - file
    - linter
